<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kontakt-Buttons (1:1 aus hb_brand_pd.css)</title>

<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
  :root{
    /* Tokens wie im Projekt vorhanden (nur was die Buttons brauchen) */
    --shadow-md: 0 10px 24px rgba(0,0,0,.28);
    --shadow-inset: 0 2px 0 rgba(255,255,255,.12) inset;
  }

  /* Bühne nur für Demo */
  body{
    margin:0; min-height:100dvh; display:grid; place-items:center;
    background: radial-gradient(1200px 700px at 20% -10%, #6a7fbd 0%, #3158a4 40%, #0a2b74 100%) fixed;
    font-family: "Hanken Grotesk", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color:#fff;
  }
  .wrap{ text-align:center }
  .btn-group{ display:flex; gap:.6rem; align-items:center; justify-content:center; flex-wrap:wrap; }

  /* ===== 1:1 aus hb_brand_pd.css (#hero-section .btn-group[aria-label="Kontaktlinks"] .social-btn ...) ===== */
  .social-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:.6rem;
    padding:.9rem 1.4rem;     /* L20-L27 */
    min-height:3.2rem;        /* L20-L27 */
    box-sizing:border-box; 
    width:auto;               /* L23-L24 */
    border-radius:14px;       /* L24-L25 */
    font-weight:600;          /* L25 */
    white-space:nowrap;
    text-align:center;
    box-shadow: var(--shadow-md), var(--shadow-inset); /* L33-L35 */
    text-decoration:none;
    color:#fff;
  }
  .social-btn i{ margin-right:.6rem } /* L40-L41 */

  /* Varianten */
  .social-btn.is-primary{
    background: linear-gradient(90deg, #207cfa, #ff3cd0); /* L29-L33 */
    border:0;
  }
  .social-btn.is-outline{
    background: transparent;
    border:1px solid rgba(255,255,255,.85); /* L34-L37 */
    box-shadow:none;                         /* L50-L52 */
  }

  /* kleines MQ wie im File: kompakteres Padding */
  @media (max-width: 420px){
    .social-btn{ padding:.7rem 1rem; min-height:2.8rem; } /* L53-L56 */
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="btn-group" role="group" aria-label="Kontaktlinks">
      <a class="social-btn is-primary" href="https://www.linkedin.com/in/hendrik-bogner/" target="_blank" rel="noopener">
        <i class="fab fa-linkedin-in" aria-hidden="true"></i><span>LinkedIn</span>
      </a>
      <a class="social-btn is-outline" href="https://www.youtube.com/channel/UCsoqDeIj5ORMRD0Wq_PRk-Q" target="_blank" rel="noopener">
        <i class="fab fa-youtube" aria-hidden="true"></i><span>YouTube</span>
      </a>
    </div>
  </main>
</body>
</html>
