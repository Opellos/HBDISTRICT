<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Dashboard</title>

  <style>
    :root {
      /* CI-Basisfarben (anpassbar) */
      --hb-bg: #020617;
      --hb-surface: #020a1f;
      --hb-border: #0b1b3f;
      --hb-blue: #207cfa;   /* BRAND */
      --hb-pink: #ff3cd0;   /* AI */
      --hb-soft: #b5d4ff;

      --radius-xl: 1.5rem;
      --radius-m: 0.9rem;
      --gap-m: 0.85rem;
      --pad-tile: 0.75rem 1.1rem;
      --shadow-soft: 0 20px 35px rgba(0,0,0,0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #2d5eff 0, transparent 45%),
                  radial-gradient(circle at top right, #ff3cd0 0, transparent 55%),
                  var(--hb-bg);
      color: #e5edff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .dashboard-shell {
      width: min(1100px, 100%);
      background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.06),
          rgba(3, 8, 35, 0.9)
        );
      border-radius: 1.75rem;
      border: 1px solid rgba(181, 212, 255, 0.16);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      padding: 1.3rem 1.5rem;
    }

    .time-strip {
      display: flex;
      gap: var(--gap-m);
      justify-content: space-between;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .time-tile {
      flex: 1 1 150px;
      min-width: 135px;
      padding: var(--pad-tile);
      border-radius: var(--radius-m);
      border: 1px solid var(--hb-border);
      background: radial-gradient(circle at top left, rgba(45, 94, 255, 0.16), transparent 55%),
                  radial-gradient(circle at bottom right, rgba(255, 60, 208, 0.14), transparent 55%),
                  rgba(3, 9, 33, 0.92);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      position: relative;
      overflow: hidden;
    }

    .time-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(32, 124, 250, 0.4),
        rgba(255, 60, 208, 0.4)
      );
      mix-blend-mode: soft-light;
      opacity: 0;
      transition: opacity 0.18s ease-out;
      pointer-events: none;
    }

    .time-tile:hover::before {
      opacity: 1;
    }

    .time-tile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem;
      font-size: 0.7rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .badge {
      padding: 0.16rem 0.45rem;
      border-radius: 999px;
      border: 1px solid rgba(181, 212, 255, 0.4);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .badge-dot {
      width: 0.32rem;
      height: 0.32rem;
      border-radius: 999px;
      background: radial-gradient(circle, var(--hb-pink) 0, #ffb7f0 50%, transparent 70%);
      box-shadow: 0 0 10px rgba(255, 60, 208, 0.95);
    }

    .time-label {
      font-weight: 600;
      color: var(--hb-soft);
    }

    .time-value {
      font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 1.35rem;
      letter-spacing: 0.09em;
      margin-top: 0.1rem;
      white-space: nowrap;
    }

    .time-subline {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 0.15rem;
    }

    .time-tile--accent-blue {
      border-color: rgba(32, 124, 250, 0.8);
      box-shadow: 0 0 0 1px rgba(32, 124, 250, 0.35);
    }

    .time-tile--accent-pink {
      border-color: rgba(255, 60, 208, 0.8);
      box-shadow: 0 0 0 1px rgba(255, 60, 208, 0.35);
    }

    .time-tile--accent-mixed {
      border-image: linear-gradient(135deg, var(--hb-blue), var(--hb-pink)) 1;
      border-width: 1px;
      box-shadow: 0 0 0 1px rgba(181, 212, 255, 0.28);
    }

    @media (max-width: 720px) {
      .dashboard-shell {
        padding: 1.1rem;
        border-radius: 1.4rem;
      }

      .time-tile {
        flex: 1 1 calc(50% - var(--gap-m));
      }
    }

    @media (max-width: 520px) {
      .time-strip {
        flex-direction: column;
      }

      .time-tile {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-shell">
    <div class="time-strip">
      <!-- USA Westküste -->
      <div class="time-tile time-tile--accent-blue">
        <div class="time-tile-header">
          <span class="time-label">USA · West</span>
          <span class="badge">
            <span class="badge-dot"></span>
            PST/PDT
          </span>
        </div>
        <div id="us-west-time" class="time-value">--:--:--</div>
        <div class="time-subline">Los Angeles / San Francisco</div>
      </div>

      <!-- USA Ostküste -->
      <div class="time-tile time-tile--accent-blue">
        <div class="time-tile-header">
          <span class="time-label">USA · East</span>
          <span class="badge">
            <span class="badge-dot"></span>
            EST/EDT
          </span>
        </div>
        <div id="us-east-time" class="time-value">--:--:--</div>
        <div class="time-subline">New York / Miami</div>
      </div>

      <!-- Europa / Zentraleuropäisch -->
      <div class="time-tile time-tile--accent-mixed">
        <div class="time-tile-header">
          <span class="time-label">Europa</span>
          <span class="badge">
            <span class="badge-dot"></span>
            CET/CEST
          </span>
        </div>
        <div id="eu-time" class="time-value">--:--:--</div>
        <div class="time-subline">Berlin / Paris / Amsterdam</div>
      </div>

      <!-- Datum (Europa) -->
      <div class="time-tile time-tile--accent-pink">
        <div class="time-tile-header">
          <span class="time-label">Datum</span>
          <span class="badge">
            <span class="badge-dot"></span>
            DE
          </span>
        </div>
        <div id="date-display" class="time-value">--.--.----</div>
        <div class="time-subline">Format: TT.MM.JJJJ (Europa/Berlin)</div>
      </div>

      <!-- Wochentag (Europa) -->
      <div class="time-tile time-tile--accent-pink">
        <div class="time-tile-header">
          <span class="time-label">Wochentag</span>
          <span class="badge">
            <span class="badge-dot"></span>
            LOCAL
          </span>
        </div>
        <div id="weekday-display" class="time-value">------</div>
        <div class="time-subline">Sprache: Deutsch (Europa/Berlin)</div>
      </div>
    </div>
  </div>

  <script>
    const timeZones = {
      "us-west-time": "America/Los_Angeles",
      "us-east-time": "America/New_York",
      "eu-time": "Europe/Berlin"
    };

    function updateDashboard() {
      const now = new Date();

      // Uhren
      Object.entries(timeZones).forEach(([id, tz]) => {
        const el = document.getElementById(id);
        if (!el) return;

        const time = new Intl.DateTimeFormat("de-DE", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
          timeZone: tz
        }).format(now);

        el.textContent = time;
      });

      // Datum (Europa/Berlin)
      const dateEl = document.getElementById("date-display");
      if (dateEl) {
        const dateString = new Intl.DateTimeFormat("de-DE", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          timeZone: "Europe/Berlin"
        }).format(now);

        dateEl.textContent = dateString;
      }

      // Wochentag (Europa/Berlin, Deutsch)
      const weekdayEl = document.getElementById("weekday-display");
      if (weekdayEl) {
        const weekdayString = new Intl.DateTimeFormat("de-DE", {
          weekday: "long",
          timeZone: "Europe/Berlin"
        }).format(now);

        // Erstes Zeichen groß, Rest wie geliefert
        const normalized =
          weekdayString.charAt(0).toUpperCase() + weekdayString.slice(1);

        weekdayEl.textContent = normalized;
      }
    }

    updateDashboard();
    setInterval(updateDashboard, 1000);
  </script>
</body>
</html>
