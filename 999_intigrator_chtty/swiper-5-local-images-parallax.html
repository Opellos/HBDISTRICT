<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Swiper Beispiel – 5 lokale Bilder</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
:root{
  --txt: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.70);
  --stroke: rgba(255,255,255,.14);
}
*{ box-sizing:border-box; }
body{
  margin:0;
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:
    radial-gradient(1200px 700px at 20% 15%, rgba(110,231,255,0.14), transparent 60%),
    radial-gradient(900px 600px at 80% 30%, rgba(167,139,250,0.14), transparent 55%),
    linear-gradient(180deg, #04040b, #070914);
  color: var(--txt);
}

.swiper{ width:100%; height:100vh; }

.swiper-slide{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;

  /* Mouse vars fallback */
  --mx: 0px;
  --my: 0px;
}

/* Bild (Base Layer) */
.slide-img{
  position:absolute;
  inset:-6%;
  width:112%;
  height:112%;
  object-fit:cover;
  transform: translate3d(calc(var(--mx) * -0.08), calc(var(--my) * -0.08), 0) scale(1.06);
  transition: transform 900ms cubic-bezier(.2,.8,.2,1);
  will-change: transform;
  filter: saturate(1.02) contrast(1.02);
  background: #0b0c10; /* falls Bild fehlt */
}

/* Depth Layers */
.layer{
  position:absolute;
  inset:-8%;
  pointer-events:none;
  will-change: transform, filter, opacity;
}
.layer-back{
  background:
    radial-gradient(circle at 22% 28%, rgba(255,255,255,0.18), transparent 60%),
    radial-gradient(circle at 78% 72%, rgba(255,255,255,0.12), transparent 62%);
  transform: translate3d(calc(var(--mx) * -0.20), calc(var(--my) * -0.20), 0) scale(1.08);
  filter: blur(7px);
  opacity: .95;
}
.layer-mid{
  background:
    radial-gradient(circle at 55% 35%, rgba(255,255,255,0.14), transparent 58%),
    radial-gradient(circle at 40% 75%, rgba(255,255,255,0.10), transparent 64%);
  transform: translate3d(calc(var(--mx) * -0.12), calc(var(--my) * -0.12), 0) scale(1.06);
  filter: blur(2px);
  opacity: .98;
}
.layer-front{
  background: linear-gradient(180deg, rgba(0,0,0,0.06), rgba(0,0,0,0.42));
  transform: translate3d(calc(var(--mx) * 0.06), calc(var(--my) * 0.06), 0);
  opacity: 1;
}

/* Glass Caption */
.caption{
  position:relative;
  z-index:10;
  text-align:center;
  padding: 26px 18px;
  border-radius: 22px;
  background: rgba(0,0,0,0.24);
  border: 1px solid var(--stroke);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 22px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.10);
  transform: translate3d(calc(var(--mx) * 0.05), calc(var(--my) * 0.05), 0);
  max-width: min(720px, calc(100vw - 40px));
}
.caption h2{
  margin:0 0 10px;
  font-size: clamp(32px, 6vw, 70px);
  letter-spacing: .6px;
}
.caption p{
  margin:0;
  font-size: 17px;
  color: var(--muted);
}

/* Swiper UI */
.swiper-pagination-progressbar{ background: rgba(255,255,255,0.16); }
.swiper-pagination-progressbar-fill{ background: #fff; }
.swiper-button-prev, .swiper-button-next{ color:#fff; }

/* optional: inactive slides a bit dimmer */
.swiper-slide{ transition: filter 650ms ease; }
.swiper-slide:not(.swiper-slide-active){ filter: saturate(.95) contrast(.98) brightness(.92); }

/* small note */
.note{
  position: fixed;
  left: 14px;
  bottom: 12px;
  z-index: 30;
  font-size: 12px;
  color: rgba(255,255,255,.62);
  background: rgba(0,0,0,.22);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 14px;
  padding: 10px 12px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<div class="swiper">
  <div class="swiper-wrapper">

    <div class="swiper-slide" data-title="Bild 1" data-sub="case_assets/bild_1.png">
      <img class="slide-img" src="case_assets/bild_1.png" alt="Bild 1">
      <div class="layer layer-back" data-swiper-parallax="-35%"></div>
      <div class="layer layer-mid"  data-swiper-parallax="-20%"></div>
      <div class="layer layer-front" data-swiper-parallax="-10%"></div>
      <div class="caption">
        <h2 data-swiper-parallax="-220">Bild 1</h2>
        <p data-swiper-parallax="-120">Parallax + Mousemove Depth</p>
      </div>
    </div>

    <div class="swiper-slide" data-title="Bild 2" data-sub="case_assets/bild_2.png">
      <img class="slide-img" src="case_assets/bild_2.png" alt="Bild 2">
      <div class="layer layer-back" data-swiper-parallax="-35%"></div>
      <div class="layer layer-mid"  data-swiper-parallax="-20%"></div>
      <div class="layer layer-front" data-swiper-parallax="-10%"></div>
      <div class="caption">
        <h2 data-swiper-parallax="-220">Bild 2</h2>
        <p data-swiper-parallax="-120">Lokale Dateien, keine externen Bilder</p>
      </div>
    </div>

    <div class="swiper-slide" data-title="Bild 3" data-sub="case_assets/bild_3.png">
      <img class="slide-img" src="case_assets/bild_3.png" alt="Bild 3">
      <div class="layer layer-back" data-swiper-parallax="-35%"></div>
      <div class="layer layer-mid"  data-swiper-parallax="-20%"></div>
      <div class="layer layer-front" data-swiper-parallax="-10%"></div>
      <div class="caption">
        <h2 data-swiper-parallax="-220">Bild 3</h2>
        <p data-swiper-parallax="-120">Autoplay • Keyboard • Progressbar</p>
      </div>
    </div>

    <div class="swiper-slide" data-title="Bild 4" data-sub="case_assets/bild_4.png">
      <img class="slide-img" src="case_assets/bild_4.png" alt="Bild 4">
      <div class="layer layer-back" data-swiper-parallax="-35%"></div>
      <div class="layer layer-mid"  data-swiper-parallax="-20%"></div>
      <div class="layer layer-front" data-swiper-parallax="-10%"></div>
      <div class="caption">
        <h2 data-swiper-parallax="-220">Bild 4</h2>
        <p data-swiper-parallax="-120">Blur-Depth Layering</p>
      </div>
    </div>

    <div class="swiper-slide" data-title="Bild 5" data-sub="case_assets/bild_5.png">
      <img class="slide-img" src="case_assets/bild_5.png" alt="Bild 5">
      <div class="layer layer-back" data-swiper-parallax="-35%"></div>
      <div class="layer layer-mid"  data-swiper-parallax="-20%"></div>
      <div class="layer layer-front" data-swiper-parallax="-10%"></div>
      <div class="caption">
        <h2 data-swiper-parallax="-220">Bild 5</h2>
        <p data-swiper-parallax="-120">mousemove depth reagiert nur auf aktiven Slide</p>
      </div>
    </div>

  </div>

  <div class="swiper-button-prev" aria-label="Vorheriger Slide"></div>
  <div class="swiper-button-next" aria-label="Nächster Slide"></div>
  <div class="swiper-pagination"></div>
</div>

<div class="note">Lege deine Bilder unter <strong>case_assets/</strong> ab: bild_1.png … bild_5.png</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
const swiper = new Swiper('.swiper', {
  speed: 1200,
  loop: true,
  parallax: true,
  pagination: { el: '.swiper-pagination', type: 'progressbar' },
  navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
  autoplay: { delay: 3400, disableOnInteraction: false },
  keyboard: { enabled: true }
});

/* Mousemove Parallax:
   Wir schreiben pro Move CSS-Variablen (--mx/--my) auf den aktiven Slide.
*/
const root = document.querySelector('.swiper');
let raf = 0;

function setVarsForActiveSlide(clientX, clientY){
  const slide = document.querySelector('.swiper-slide-active');
  if(!slide) return;

  const r = root.getBoundingClientRect();
  const x = (clientX - r.left) / r.width;   // 0..1
  const y = (clientY - r.top)  / r.height;  // 0..1

  const mx = (x - 0.5) * 80;   // -40..40 px
  const my = (y - 0.5) * 80;

  slide.style.setProperty('--mx', mx.toFixed(2) + 'px');
  slide.style.setProperty('--my', my.toFixed(2) + 'px');
}

function onMove(e){
  const p = e.touches ? e.touches[0] : e;
  if(raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(() => setVarsForActiveSlide(p.clientX, p.clientY));
}

root.addEventListener('mousemove', onMove, { passive: true });
root.addEventListener('touchmove', onMove, { passive: true });

root.addEventListener('mouseleave', () => {
  const slide = document.querySelector('.swiper-slide-active');
  if(!slide) return;
  slide.style.setProperty('--mx', '0px');
  slide.style.setProperty('--my', '0px');
});

swiper.on('slideChangeTransitionStart', () => {
  document.querySelectorAll('.swiper-slide').forEach(s => {
    s.style.setProperty('--mx', '0px');
    s.style.setProperty('--my', '0px');
  });
});
</script>

</body>
</html>
