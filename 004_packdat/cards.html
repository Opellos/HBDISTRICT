<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hb_cards_01 – Transparent CI Card</title>
<style>
  :root{
    --card-w: 420px;
    --radius: 16px;
    --text: #fff;
    --muted: rgba(255,255,255,.78);
    --muted-2: rgba(255,255,255,.55);
    --line: rgba(255,255,255,.18);
    --shadow: 0 8px 26px rgba(0,0,0,.35);
  }
  html,body{height:100%; margin:0;}
  body{
    font-family:'Montserrat', sans-serif;
    color:var(--text);
  }

  section.gradient-bg{
    display:flex; justify-content:center; align-items:center; height:100vh;
    background:linear-gradient(135deg, #2d5eff 0%, #7d32df 100%);
  }

  .card{ position:relative; width:var(--card-w); border-radius:var(--radius); overflow:hidden;
    background:rgba(15,23,42,0.45); box-shadow: var(--shadow); isolation:isolate;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border:1px solid rgba(255,255,255,.25);
  }

  .card::before{
    content:""; position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(180% 120% at 50% 70%, rgba(96,165,250,.35), rgba(244,114,182,.35) 45%, transparent 70%),
      linear-gradient(120deg, rgba(96,165,250,.25), rgba(244,114,182,.35));
    mix-blend-mode: screen;
    filter: blur(0.5px);
  }

  .card::after{
    content:""; position:absolute; inset:-6% -10%; z-index:0; pointer-events:none;
    background:
      repeating-linear-gradient(90deg,
        rgba(99,102,241,.0) 0, rgba(99,102,241,.08) 2px, transparent 60px),
      linear-gradient(90deg,#172554 0%, #1e3a8a 15%, #1e40af 28%, #7c3aed 40%, #ec4899 55%, #1e40af 72%, #0ea5e9 100%);
    opacity:.55; filter: blur(18px) saturate(115%);
    transform: translateY(-6px) scale(1.02);
  }

  .content{ position:relative; z-index:1; padding:24px; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .plan{ font-size:14px; color:var(--muted-2); }
  .badge{ display:inline-flex; align-items:center; font-weight:700; font-size:12px; padding:.35rem .6rem; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.25); }

  .title{ font-size:28px; line-height:1.2; margin:.5rem 0; font-weight:800; }
  .subtitle{ margin:0 0 18px; color:var(--muted-2); font-size:14px; }
  .price{ display:flex; align-items:baseline; gap:8px; margin:12px 0 10px; }
  .amount{ font-size:48px; font-weight:800; }
  .per{ color:var(--muted-2); font-size:14px; }
  .actions{ display:flex; gap:12px; margin:16px 0; }
  .btn{ appearance:none; border:0; cursor:pointer; border-radius:10px; padding:12px 16px; font-weight:600; line-height:1; color:#fff; font-family:'Montserrat', sans-serif; }
  .btn-primary{ background:rgba(0,0,0,0.65); }
  .btn-ghost{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); }
  hr{ border:0; height:1px; background:linear-gradient(90deg, transparent, var(--line), transparent); margin:18px 0; }
  .feat{ list-style:none; padding:0; margin:0; display:grid; gap:14px; }
  .feat li{ display:flex; align-items:center; gap:10px; color:var(--muted); font-size:14px; }
  .feat svg{ width:16px; height:16px; stroke:#a7f3d0; }
  .bottom-fade{ position:absolute; inset:auto 0 0 0; height:120px; background:linear-gradient(to bottom, transparent, rgba(0,0,0,.4) 60%, rgba(0,0,0,.75)); z-index:0; }
</style>
</head>
<body>
  <section class="gradient-bg">
    <article class="card">
      <div class="content">
        <div class="topbar">
          <div class="plan">Scale Team</div>
          <div class="badge">MOST POPULAR</div>
        </div>
        <h1 class="title">Built for teams and agencies</h1>
        <p class="subtitle">Collaboration, permissions, and performance at scale.</p>
        <div class="price"><div class="amount">$79</div><div class="per">/seat/mo</div></div>
        <div class="actions">
          <button class="btn btn-primary">Start Team</button>
          <button class="btn btn-ghost">Talk to sales</button>
        </div>
        <hr>
        <ul class="feat">
          <li><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='m20 6-11 11-5-5'/></svg>Everything in Solo</li>
          <li><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='m20 6-11 11-5-5'/></svg>Unlimited projects & shared libraries</li>
          <li><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='m20 6-11 11-5-5'/></svg>Roles, permissions & version history</li>
          <li><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='m20 6-11 11-5-5'/></svg>SSO/SAML, audit logs & API access</li>
          <li><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='m20 6-11 11-5-5'/></svg>Priority support & 99.9% SLA</li>
        </ul>
      </div>
      <div class="bottom-fade"></div>
    </article>
  </section>
</body>
</html>
