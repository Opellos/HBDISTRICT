<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Kurs Widget mit Alarmen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            padding: 20px;
            color: #E5E7EB;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .widget {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            padding: 30px;
            text-align: center;
            width: 250px;
            transition: transform 0.3s ease;
        }
        .widget:hover {
            transform: scale(1.05);
        }
        .title {
            font-size: 20px;
            color: #FFFFFF;
            margin-bottom: 10px;
            font-weight: 800;
        }
        .price {
            font-size: 32px;
            font-weight: 800;
            color: #0EA5E9;
            margin: 0;
        }
        .error {
            color: #EF4444;
        }
        .update-info {
            font-size: 14px;
            color: #9CA3AF;
            margin-top: 10px;
            font-weight: 600;
        }
        .alarm-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            padding: 20px;
            width: 80%;
            max-width: 800px;
        }
        .alarm-section h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 800;
            color: #FFFFFF;
        }
        .alarm-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .alarm-form input, .alarm-form select {
            padding: 10px;
            border: 1px solid #374151;
            border-radius: 5px;
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            color: #E5E7EB;
            font-weight: 600;
        }
        .alarm-form button {
            padding: 10px 20px;
            background-color: #3B82F6;
            color: #FFFFFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        .alarm-list {
            list-style: none;
            padding: 0;
        }
        .alarm-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #374151;
            font-weight: 600;
        }
        .alarm-item button {
            background-color: #EF4444;
            color: #FFFFFF;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="widget">
            <h1 class="title">Bitcoin in EUR</h1>
            <p class="price" id="bitcoin-eur">Lade...</p>
            <p class="update-info">Aktualisiert alle 5 Sekunden</p>
        </div>
        <div class="widget">
            <h1 class="title">Bitcoin in USD</h1>
            <p class="price" id="bitcoin-usd">Lade...</p>
            <p class="update-info">Aktualisiert alle 5 Sekunden</p>
        </div>
        <div class="widget">
            <h1 class="title">Bitcoin in USDT</h1>
            <p class="price" id="bitcoin-usdt">Lade...</p>
            <p class="update-info">Aktualisiert alle 5 Sekunden</p>
        </div>
    </div>

    <div class="alarm-section">
        <h2>Alarme für Bitcoin in USD (max. 5)</h2>
        <div class="alarm-form">
            <input type="text" id="alarm-name" placeholder="Optionaler Name (z.B. Long, Short TP, Warnung tief, Warnung hoch)">
            <input type="number" id="alarm-threshold" placeholder="Schwellenwert (lade aktuellen Kurs...)" required>
            <select id="alarm-direction" required>
                <option value="above">Über</option>
                <option value="below">Unter</option>
            </select>
            <button onclick="addAlarm()">Alarm hinzufügen</button>
        </div>
        <ul class="alarm-list" id="alarm-list"></ul>
    </div>

    <script>
        let alarms = JSON.parse(localStorage.getItem('btcAlarms')) || [];
        let currentUsd = 0; // Für Schwellenwert-Vorschlag

        function updateEur() {
            fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur')
                .then(response => response.json())
                .then(data => {
                    const eur = data.bitcoin.eur || 0;
                    document.getElementById('bitcoin-eur').innerText = eur.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
                    document.getElementById('bitcoin-eur').classList.remove('error');
                })
                .catch(error => {
                    document.getElementById('bitcoin-eur').innerText = 'Fehler';
                    document.getElementById('bitcoin-eur').classList.add('error');
                    console.error('EUR Error:', error);
                });
        }

        function updateUsd() {
            fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd')
                .then(response => response.json())
                .then(data => {
                    currentUsd = data.bitcoin.usd || 0;
                    document.getElementById('bitcoin-usd').innerText = currentUsd.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' $';
                    document.getElementById('bitcoin-usd').classList.remove('error');
                    // Schwellenwert-Placeholder aktualisieren
                    document.getElementById('alarm-threshold').placeholder = `Schwellenwert (z.B. ${Math.round(currentUsd)})`;
                    checkAlarms(currentUsd);
                })
                .catch(error => {
                    document.getElementById('bitcoin-usd').innerText = 'Fehler';
                    document.getElementById('bitcoin-usd').classList.add('error');
                    console.error('USD Error:', error);
                });
        }

        function updateUsdt() {
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
                .then(response => response.json())
                .then(data => {
                    const usdt = parseFloat(data.price) || 0;
                    document.getElementById('bitcoin-usdt').innerText = usdt.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' USDT';
                    document.getElementById('bitcoin-usdt').classList.remove('error');
                })
                .catch(error => {
                    document.getElementById('bitcoin-usdt').innerText = 'Fehler';
                    document.getElementById('bitcoin-usdt').classList.add('error');
                    console.error('USDT Error:', error);
                });
        }

        function updatePrices() {
            updateEur();
            updateUsd();
            updateUsdt();
        }

        function addAlarm() {
            if (alarms.length >= 5) {
                alert('Maximal 5 Alarme erlaubt!');
                return;
            }
            const name = document.getElementById('alarm-name').value || 'Unbenannt';
            const threshold = parseFloat(document.getElementById('alarm-threshold').value);
            const direction = document.getElementById('alarm-direction').value;
            if (isNaN(threshold)) {
                alert('Bitte einen gültigen Schwellenwert eingeben!');
                return;
            }
            alarms.push({ name, threshold, direction, triggered: false });
            saveAlarms();
            renderAlarms();
            clearForm();
        }

        function deleteAlarm(index) {
            alarms.splice(index, 1);
            saveAlarms();
            renderAlarms();
        }

        function checkAlarms(currentUsd) {
            alarms.forEach(alarm => {
                if (!alarm.triggered) {
                    if ((alarm.direction === 'above' && currentUsd > alarm.threshold) ||
                        (alarm.direction === 'below' && currentUsd < alarm.threshold)) {
                        alert(`Alarm ausgelöst: ${alarm.name} - BTC/USD ist ${alarm.direction === 'above' ? 'über' : 'unter'} ${alarm.threshold} $! Aktuell: ${currentUsd.toFixed(2)} $`);
                        alarm.triggered = true;
                        saveAlarms();
                    }
                }
            });
        }

        function saveAlarms() {
            localStorage.setItem('btcAlarms', JSON.stringify(alarms));
        }

        function renderAlarms() {
            const list = document.getElementById('alarm-list');
            list.innerHTML = '';
            alarms.forEach((alarm, index) => {
                const li = document.createElement('li');
                li.className = 'alarm-item';
                li.innerText = `${alarm.name}: ${alarm.direction === 'above' ? 'Über' : 'Unter'} ${alarm.threshold} $ ${alarm.triggered ? '(Ausgelöst)' : ''}`;
                const btn = document.createElement('button');
                btn.innerText = 'Löschen';
                btn.onclick = () => deleteAlarm(index);
                li.appendChild(btn);
                list.appendChild(li);
            });
        }

        function clearForm() {
            document.getElementById('alarm-name').value = '';
            document.getElementById('alarm-threshold').value = '';
            document.getElementById('alarm-direction').value = 'above';
        }

        // Initiale Lade
        updatePrices();
        renderAlarms();
        setInterval(updatePrices, 5000);
    </script>
</body>
</html>
