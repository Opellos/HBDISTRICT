<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brand + AI – Skalierungs‑Test (Montserrat, responsiv, kein Umbruch)</title>

  <!-- Montserrat wie im Original, fette Schnitte -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Basismaße des UNskalierten Schriftzugs */
      --base-w: 800px;
      --base-h: 200px;
      /* Fallback-Skalierung (falls Container-Queries fehlen) */
      --s: clamp(0.60, 1.2vw + 0.70, 1.20);
    }

    /* Test-Section: Zielumgebung grob nachgebildet */
    .section {
      min-height: 60vh;
      display: grid;
      place-items: center;
      padding: 6rem 1.5rem;
      background:
        radial-gradient(1000px 500px at 20% 0%, #4fd1d9, transparent 70%),
        radial-gradient( 900px 500px at 80% 0%, #ff3ea5, transparent 70%),
        linear-gradient(135deg, #7b5cff, #ff3ea5 45%, #4fd1d9);
      color: #fff;
    }

    /* Bühne: Container mit Breiten-Clamp; cqw macht Skalierung exakt containerbasiert */
    .brand-stage{
      container-type: inline-size;
      width: clamp(280px, 92vw, 1100px);
      margin-inline: auto;
      position: relative;
      /* Container-basierte, echte Responsivität → Schrift skaliert mit Breite */
      --s: clamp(0.50, calc(100cqw / var(--base-w)), 1.50);
    }

    /* Exakt die skalierten Höhe reservieren → kein Layout-Sprung */
    .brand-proxy{ height: calc(var(--base-h) * var(--s)); }

    /* Originalgröße absolut eingelegt und EINHEITLICH skaliert */
    .brand-scale{
      position: absolute;
      inset: 0;
      width: var(--base-w);
      height: var(--base-h);
      transform-origin: top left;
      transform: scale(var(--s));
    }

    /* Letter-Block: Montserrat, kein Umbruch */
    .letters{
      position: relative;
      width: 100%;
      height: 100%;
      font-family: "Montserrat", ui-sans-serif, system-ui, sans-serif;
      font-weight: 800;
      white-space: nowrap;   /* bricht NICHT um */
      line-height: 1;
    }

    /* Einzelbuchstaben: absolute Offsets → aus brand_version_B.html übernehmen */
    .letters span{
      position: absolute;
      font-size: 160px; /* Basisgröße im UNskalierten Zustand */
      letter-spacing: 0;
      user-select: none;
    }

    /* DEMO-Offsets – bei Bedarf durch die realen ersetzen */
    .B { left:  10px; top: 10px; }
    .R { left: 115px; top: 10px; }
    .A { left: 235px; top: 10px; } /* FIXPUNKT */
    .N { left: 355px; top: 10px; }
    .D { left: 475px; top: 10px; }
    .plus { left: 585px; top: 10px; font-size: 140px; }
    .I { left: 655px; top: 10px; } /* FIXPUNKT */

    /* Farb-Logik (vereinfacht an Vorlage angelehnt) */
    .B,.R,.N,.D {
      background: linear-gradient(135deg,#7b5cff,#4fd1d9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .A,.I,.plus { color: #ff3ea5; }

    /* Optionales Desktop-Feintuning nur über Containerbreite */
    @container (min-width: 900px){
      .brand-stage{ --s: clamp(0.60, calc(100cqw / var(--base-w)), 1.60); }
    }
    @container (min-width: 1100px){
      .brand-stage{ --s: clamp(0.70, calc(100cqw / var(--base-w)), 1.70); }
    }
  </style>
</head>
<body>
  <section class="section">
    <div class="brand-stage">
      <div class="brand-proxy"></div>
      <div class="brand-scale" aria-label="BRAND + AI">
        <div class="letters">
          <span class="B">B</span>
          <span class="R">R</span>
          <span class="A">A</span>
          <span class="N">N</span>
          <span class="D">D</span>
          <span class="plus">+</span>
          <span class="I">I</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
